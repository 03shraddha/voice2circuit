<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>voice2circuit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="panel-header">
  <div class="header-left">
    <div id="status-dot"></div>
    <span id="status-label">Connecting…</span>
    <h1 class="app-title">voice2circuit</h1>
  </div>

  <div class="header-center">
    <div class="scope-housing">
      <span class="scope-label">AUDIO IN</span>
      <canvas id="waveform" width="320" height="52"></canvas>
    </div>
  </div>

  <div class="header-right">
    <button id="mic-btn" disabled>
      <span class="mic-icon"></span>
      <span class="mic-label">REC</span>
    </button>
  </div>
</header>

<main class="workbench">
  <div class="corner-bracket corner-tl"></div>
  <div class="corner-bracket corner-tr"></div>
  <div class="corner-bracket corner-bl"></div>
  <div class="corner-bracket corner-br"></div>

  <div id="circuit-display" class="circuit-frame">
    <div id="placeholder" class="placeholder-message">
      <svg class="placeholder-icon" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="8"  cy="32" r="4" stroke="currentColor" stroke-width="1.5"/>
        <circle cx="32" cy="16" r="4" stroke="currentColor" stroke-width="1.5"/>
        <circle cx="56" cy="32" r="4" stroke="currentColor" stroke-width="1.5"/>
        <circle cx="32" cy="48" r="4" stroke="currentColor" stroke-width="1.5"/>
        <line x1="12" y1="32" x2="28" y2="20" stroke="currentColor" stroke-width="1.5" stroke-dasharray="3 2"/>
        <line x1="36" y1="20" x2="52" y2="30" stroke="currentColor" stroke-width="1.5" stroke-dasharray="3 2"/>
        <line x1="52" y1="34" x2="36" y2="44" stroke="currentColor" stroke-width="1.5" stroke-dasharray="3 2"/>
        <line x1="28" y1="44" x2="12" y2="34" stroke="currentColor" stroke-width="1.5" stroke-dasharray="3 2"/>
      </svg>
      <p>AWAITING CIRCUIT DESCRIPTION</p>
      <small>"Connect a 10k resistor from VCC to base of NPN transistor…"</small>
    </div>
    <div id="spinner" class="render-spinner">
      <div class="spinner-ring"></div>
      <span class="spinner-label">RENDERING…</span>
    </div>
  </div>
</main>

<footer class="telemetry-bar">
  <div class="telemetry-group">
    <span class="telemetry-key">CIRCUIT</span>
    <span id="circuit-title">—</span>
  </div>

  <div class="telemetry-group transcript-group">
    <span class="telemetry-key">TRANSCRIPT</span>
    <span id="transcript"></span>
  </div>

  <div class="telemetry-group">
    <button class="export-btn" id="export-svg" disabled>EXPORT SVG</button>
  </div>
</footer>

<div id="error-toast"></div>

<script src="app.js"></script>
</body>
</html>
