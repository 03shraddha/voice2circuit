<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>voice2circuit</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3a;
      --accent: #7c6af5;
      --accent-glow: rgba(124,106,245,0.25);
      --text: #e0e0e8;
      --text-dim: #6b6e82;
      --green: #3ecf8e;
      --red: #ff5c5c;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    header h1 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: var(--text);
    }

    #status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--text-dim);
      transition: background 0.3s;
    }
    #status-dot.connected    { background: var(--green); }
    #status-dot.speaking     { background: var(--accent); box-shadow: 0 0 8px var(--accent-glow); }
    #status-dot.disconnected { background: var(--red); }

    #status-label {
      font-size: 12px;
      color: var(--text-dim);
      margin-right: auto;
    }

    /* Waveform */
    #waveform {
      width: 120px;
      height: 32px;
    }

    /* Mic button */
    #mic-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 18px;
      border-radius: 20px;
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      background: var(--accent);
      color: #fff;
      transition: opacity 0.2s, box-shadow 0.2s;
    }
    #mic-btn:hover { opacity: 0.85; }
    #mic-btn.recording {
      background: var(--red);
      box-shadow: 0 0 12px rgba(255,92,92,0.4);
    }
    #mic-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Main canvas ── */
    main {
      overflow: auto;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      padding: 24px;
    }

    #circuit-display {
      max-width: 100%;
      max-height: 100%;
    }

    #circuit-display svg {
      max-width: 100%;
      height: auto;
      border-radius: 8px;
      background: #fff;
      padding: 16px;
      box-shadow: 0 4px 32px rgba(0,0,0,0.4);
    }

    #placeholder {
      text-align: center;
      color: var(--text-dim);
    }
    #placeholder p { font-size: 15px; margin-bottom: 8px; }
    #placeholder small { font-size: 12px; opacity: 0.6; }

    #spinner {
      display: none;
      width: 36px;
      height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Footer ── */
    footer {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 24px;
      border-top: 1px solid var(--border);
      background: var(--surface);
    }

    #circuit-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #transcript {
      font-size: 12px;
      color: var(--text-dim);
      font-style: italic;
      flex: 2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .export-btn {
      padding: 6px 14px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      font-size: 12px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    .export-btn:hover { border-color: var(--accent); background: var(--accent-glow); }
    .export-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    #error-toast {
      position: fixed;
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--red);
      color: #fff;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 13px;
      display: none;
      z-index: 100;
      max-width: 80vw;
    }
  </style>
</head>
<body>

<header>
  <div id="status-dot"></div>
  <h1>voice2circuit</h1>
  <span id="status-label">Connecting…</span>
  <canvas id="waveform" width="120" height="32"></canvas>
  <button id="mic-btn" disabled>🎤 Start listening</button>
</header>

<main>
  <div id="circuit-display">
    <div id="placeholder">
      <p>Describe a circuit to get started</p>
      <small>"Connect a 10k resistor from VCC to base of NPN transistor…"</small>
    </div>
    <div id="spinner"></div>
  </div>
</main>

<footer>
  <span id="circuit-title">No circuit yet</span>
  <span id="transcript"></span>
  <button class="export-btn" id="export-svg" disabled>Export SVG</button>
</footer>

<div id="error-toast"></div>

<script src="app.js"></script>
</body>
</html>
